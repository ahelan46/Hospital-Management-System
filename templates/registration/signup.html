{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration — MedCore HMS</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS (Reusing login styles for consistency) -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}">

    <style>
        .login-card {
            max-width: 600px;
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h1 {
            font-size: 1.8rem;
            color: #1a202c;
            margin-bottom: 5px;
        }

        .signup-header p {
            color: #718096;
        }

        select.form-control {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 0.95rem;
            appearance: none;
            cursor: pointer;
        }

        .login-btn {
            margin-top: 20px;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="signup-header">
            <div class="brand-icon" style="margin: 0 auto 15px;">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h1>Create Patient Account</h1>
            <p>Join our secure medical network</p>
        </div>

        {% if messages %}
        <div class="login-errors" style="margin-bottom: 20px;">
            {% for message in messages %}
            <p><i class="bi bi-exclamation-circle"></i> {{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" id="signupForm">
            {% csrf_token %}

            <div class="form-grid">
                <!-- Row 1: Credentials -->
                <div class="form-group">
                    <i class="bi bi-person-badge input-icon"></i>
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <!-- Row 2: Personal Info -->
                <div class="form-group full">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="full_name" placeholder="Full Legal Name" required>
                </div>

                <div class="form-group">
                    <i class="bi bi-calendar-event input-icon"></i>
                    <input type="date" name="dob" title="Date of Birth" required>
                </div>

                <div class="form-group">
                    <i class="bi bi-phone input-icon"></i>
                    <input type="text" name="phone" placeholder="Phone Number" required>
                </div>

                <!-- Row 3: Health Data -->
                <div class="form-group">
                    <i class="bi bi-droplet-half input-icon"></i>
                    <select name="blood_group" class="form-control" required>
                        <option value="" disabled selected>Blood Group</option>
                        {% for bg in blood_groups %}
                        <option value="{{ bg }}">{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <i class="bi bi-gender-ambiguous input-icon"></i>
                    <select name="gender" class="form-control" required>
                        <option value="" disabled selected>Select Gender</option>
                        {% for g in genders %}
                        <option value="{{ g }}">{{ g|title }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Row 4: Address -->
                <div class="form-group full">
                    <i class="bi bi-geo-alt input-icon"></i>
                    <input type="text" name="address" placeholder="Physical Address" required>
                </div>

                <!-- Row 5: Passwords -->
                <div class="form-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <i class="bi bi-shield-lock input-icon"></i>
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="bi bi-check-circle"></i> Complete Registration
            </button>
        </form>

        <div class="login-footer" style="margin-top: 30px;">
            Already have an account? <a href="{% url 'login' %}" style="color: #3182ce; font-weight: 600;">Sign In</a>
        </div>
    </div>

</body>

</html>
